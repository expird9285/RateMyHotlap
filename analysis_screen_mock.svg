<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="RateMyHotlap compare analysis mock">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090c14"/>
      <stop offset="100%" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>

  <circle cx="180" cy="140" r="120" fill="#3b82f6" opacity="0.18" filter="url(#soft)"/>
  <circle cx="1260" cy="760" r="180" fill="#10b981" opacity="0.12" filter="url(#soft)"/>

  <text x="90" y="70" fill="#9ca3af" font-size="18" font-family="Inter, Segoe UI, Arial">← Back to Dashboard</text>

  <text x="90" y="110" fill="url(#brand)" font-size="38" font-weight="700" font-family="Inter, Segoe UI, Arial">RateMyHotlap Analysis</text>
  <text x="90" y="138" fill="#6b7280" font-size="16" font-family="Inter, Segoe UI, Arial">Compare view based on current frontend/src/app/compare/page.tsx</text>

  <rect x="90" y="175" width="400" height="145" rx="20" fill="#101827" stroke="#1e3a8a" stroke-opacity="0.7"/>
  <text x="120" y="210" fill="#60a5fa" font-size="14" font-weight="700" font-family="Inter, Segoe UI, Arial">LAP A</text>
  <text x="120" y="242" fill="#f3f4f6" font-size="24" font-weight="700" font-family="Inter, Segoe UI, Arial">Spa-Francorchamps</text>
  <text x="120" y="270" fill="#9ca3af" font-size="16" font-family="Inter, Segoe UI, Arial">Ferrari 296 GT3</text>
  <text x="120" y="305" fill="#34d399" font-size="36" font-weight="700" font-family="Consolas, Menlo, monospace">1:58.432</text>

  <rect x="520" y="175" width="310" height="145" rx="20" fill="#101827" stroke="#3f3f46"/>
  <text x="635" y="212" text-anchor="middle" fill="#71717a" font-size="13" font-weight="700" font-family="Inter, Segoe UI, Arial">DIFFERENCE</text>
  <text x="675" y="262" text-anchor="middle" fill="#ef4444" font-size="44" font-weight="800" font-family="Consolas, Menlo, monospace">+0.241s</text>
  <text x="675" y="292" text-anchor="middle" fill="#6b7280" font-size="14" font-family="Inter, Segoe UI, Arial">Lap A is slower by 241ms</text>

  <rect x="860" y="175" width="400" height="145" rx="20" fill="#101827" stroke="#9a3412" stroke-opacity="0.7"/>
  <text x="890" y="210" fill="#fb923c" font-size="14" font-weight="700" font-family="Inter, Segoe UI, Arial">LAP B</text>
  <text x="890" y="242" fill="#f3f4f6" font-size="24" font-weight="700" font-family="Inter, Segoe UI, Arial">Spa-Francorchamps</text>
  <text x="890" y="270" fill="#9ca3af" font-size="16" font-family="Inter, Segoe UI, Arial">Porsche 992 GT3 R</text>
  <text x="890" y="305" fill="#34d399" font-size="36" font-weight="700" font-family="Consolas, Menlo, monospace">1:58.191</text>

  <rect x="90" y="350" width="1170" height="220" rx="20" fill="#0b1120" stroke="#27272a"/>
  <text x="120" y="385" fill="#d1d5db" font-size="18" font-weight="600" font-family="Inter, Segoe UI, Arial">Delta Time (A - B)</text>

  <line x1="130" y1="515" x2="1220" y2="515" stroke="#52525b" stroke-dasharray="6 6"/>
  <path d="M130 470 C220 420, 320 560, 420 500 C520 440, 620 535, 720 490 C820 450, 920 525, 1020 505 C1110 490, 1160 520, 1220 495" fill="none" stroke="#ef4444" stroke-width="4"/>
  <path d="M130 470 C220 420, 320 560, 420 500 C520 440, 620 535, 720 490 C820 450, 920 525, 1020 505 C1110 490, 1160 520, 1220 495 L1220 515 L130 515 Z" fill="#ef4444" opacity="0.12"/>

  <rect x="90" y="600" width="1170" height="90" rx="16" fill="#0b1120" stroke="#27272a"/>
  <text x="120" y="635" fill="#d1d5db" font-size="18" font-family="Inter, Segoe UI, Arial">Speed - A (solid) vs B (dashed)</text>
  <line x1="120" y1="665" x2="1230" y2="665" stroke="#3b82f6" stroke-width="3"/>
  <line x1="120" y1="675" x2="1230" y2="675" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8 7" opacity="0.6"/>

  <rect x="90" y="710" width="575" height="90" rx="16" fill="#0b1120" stroke="#27272a"/>
  <text x="120" y="745" fill="#d1d5db" font-size="18" font-family="Inter, Segoe UI, Arial">Throttle Overlay</text>
  <line x1="120" y1="775" x2="630" y2="775" stroke="#22c55e" stroke-width="3"/>

  <rect x="685" y="710" width="575" height="90" rx="16" fill="#0b1120" stroke="#27272a"/>
  <text x="715" y="745" fill="#d1d5db" font-size="18" font-family="Inter, Segoe UI, Arial">Brake Overlay</text>
  <line x1="715" y1="775" x2="1225" y2="775" stroke="#ef4444" stroke-width="3"/>
</svg>
